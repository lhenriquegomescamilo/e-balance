name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Classification + CLI ────────────────────────────────────────────────────
  # Runs on macOS ARM64 because classification/ depends on nd4j-native:macosx-arm64
  # binaries that only load on Apple Silicon. The CLI module also depends on
  # classification at runtime, so it shares this runner.
  classification-and-cli:
    name: Classification & CLI tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run classification tests
        run: ./gradlew :classification:test

      - name: Run CLI tests
        run: ./gradlew test

      - name: Upload classification test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: classification-test-report
          path: classification/build/reports/tests/test/
          retention-days: 7

      - name: Upload CLI test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-test-report
          path: build/reports/tests/test/
          retention-days: 7

  # ── Backend ─────────────────────────────────────────────────────────────────
  # Separate Gradle project under backend/. No platform-native deps so it runs
  # on the cheaper ubuntu runner.
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: backend

      - name: Run backend server tests
        working-directory: backend
        run: ./gradlew :server:test

      - name: Upload backend test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/server/build/reports/tests/test/
          retention-days: 7
