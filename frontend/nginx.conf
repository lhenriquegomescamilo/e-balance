server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Trust the upstream backend's X-Forwarded-* headers when set.
    server_tokens off;

    # Use Docker's embedded DNS so the `backend` hostname is resolved at request
    # time, not at nginx startup. Without this, the container would refuse to
    # start whenever the backend is unreachable (e.g. running the image
    # standalone outside docker-compose).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_backend "backend:8080";

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Health endpoint (used by Docker healthcheck) ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- REST API → backend ----
    location /api/ {
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for the SSE import endpoint (/api/v1/transactions/import).
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ---- GraphQL → backend ----
    location /graphql {
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow GraphQL subscriptions over websockets if/when added.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- Long-cache hashed assets ----
    # Angular emits content-hashed filenames for JS/CSS chunks, so they are
    # safe to cache forever. `expires off` prevents nginx from synthesising
    # its own Cache-Control header on top of ours.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- index.html should never be cached (entry point for fresh deploys) ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ---- SPA fallback for client-side routing ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
